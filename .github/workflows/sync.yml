name: Sincronizar Skills Externas

on:
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite (UTC)
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

jobs:
  sync-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório agregador
        uses: actions/checkout@v4

      - name: Dar permissão de execução ao script
        run: chmod +x sync.sh

      - name: Executar Sincronização
        run: ./sync.sh

      - name: Verificar mudanças e fazer Commit
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Adiciona todas as mudanças
          git add .
          
          # Verifica se há algo para commitar
          if ! git diff-index --quiet HEAD; then
            git commit -m "Sincronização automática de skills [skip ci]"
            git push
          else
            echo "Nenhuma atualização encontrada nas origens."
          fi
